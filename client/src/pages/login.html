<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Fashion Freaks</title>
    <link rel="stylesheet" href="../styles/root.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="main" style="padding-top: 120px; display: flex; justify-content: center; align-items: center; min-height: 70vh;">
        <section class="section container" style="background: var(--con-color); padding: 2.5rem; border-radius: 1rem; box-shadow: 0 4px 20px var(--shadow); max-width: 400px; width: 90%;">
            <h2 class="section-title" style="text-align: center; margin-bottom: 2rem;">Login</h2>
            
            <form id="simple-login-form" style="display: flex; flex-direction: column; gap: 1.5rem;">
                <div>
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Email Address</label>
                    <input type="email" required id="login-email" placeholder="example@email.com" style="width: 100%; padding: 0.8rem; border-radius: 0.5rem; background: var(--body-color); color: var(--text-color); border: 1px solid var(--first-color);">
                </div>
                
                <div>
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Password</label>
                    <input type="password" required id="login-password" placeholder="••••••••" style="width: 100%; padding: 0.8rem; border-radius: 0.5rem; background: var(--body-color); color: var(--text-color); border: 1px solid var(--first-color);">
                </div>

                <button type="submit" class="button" style="width: 100%; padding: 1rem; border-radius: 0.5rem; font-size: 1.1rem; margin-top: 1rem;">
                    Log In <i class="fas fa-sign-in-alt"></i>
                </button>
            </form>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../scripts/root.js"></script>
    <script>
        document.getElementById("simple-login-form").addEventListener("submit", (e) => {
            e.preventDefault();
            const email = document.getElementById("login-email").value;
            // Mock Login Persistence
            localStorage.setItem("userLoggedIn", "true");
            localStorage.setItem("userEmail", email);
            
            if (window.showNotification) {
                window.showNotification("Logged in successfully!", "success");
            }
            
            setTimeout(() => {
                window.location.href = "index.html";
            }, 1500);
        });
    </script>
</body>
</html>
