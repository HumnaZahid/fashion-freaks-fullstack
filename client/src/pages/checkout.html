<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Fashion Freaks</title>
    <link rel="stylesheet" href="../styles/root.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <main class="main">
        <section class="section container">
            <h2 class="section-title">Checkout</h2>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 2rem;">
                
                <!-- Billing Details -->
                <div style="background: var(--con-color); padding: 2rem; border-radius: 1rem; box-shadow: 0 4px 20px var(--shadow);">
                    <h3 style="margin-bottom: 1.5rem; color: var(--first-color);">Shipping Information</h3>
                    <form id="checkout-form" style="display: flex; flex-direction: column; gap: 1rem;">
                        <div>
                            <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Full Name</label>
                            <input type="text" required id="checkout-name" style="width: 100%; padding: 0.8rem; border-radius: 0.5rem; background: var(--body-color); color: var(--text-color); border: 1px solid var(--first-color);">
                        </div>
                        <div>
                            <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Email Address</label>
                            <input type="email" required id="checkout-email" style="width: 100%; padding: 0.8rem; border-radius: 0.5rem; background: var(--body-color); color: var(--text-color); border: 1px solid var(--first-color);">
                        </div>
                        <div>
                            <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Phone</label>
                            <input type="text" required id="checkout-phone" style="width: 100%; padding: 0.8rem; border-radius: 0.5rem; background: var(--body-color); color: var(--text-color); border: 1px solid var(--first-color);">
                        </div>
                        <div>
                            <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Address</label>
                            <textarea required id="checkout-address" rows="3" style="width: 100%; padding: 0.8rem; border-radius: 0.5rem; background: var(--body-color); color: var(--text-color); border: 1px solid var(--first-color); font-family: inherit;"></textarea>
                        </div>
                    </form>
                </div>

                <!-- Order Summary -->
                <div style="background: var(--con-color); padding: 2rem; border-radius: 1rem; box-shadow: 0 4px 20px var(--shadow); display: flex; flex-direction: column; justify-content: space-between;">
                    <div>
                        <h3 style="margin-bottom: 1.5rem; color: var(--first-color);">Order Summary</h3>
                        <div id="checkout-products-list" style="display: flex; flex-direction: column; gap: 1rem; max-height: 300px; overflow-y: auto; padding-right: 0.5rem; margin-bottom: 1.5rem;">
                            <!-- JS will fill this with real products from cart -->
                        </div>
                    </div>

                    <div style="border-top: 2px solid var(--body-color); padding-top: 1.5rem;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                            <span>Subtotal:</span>
                            <span id="checkout-subtotal" style="font-weight: bold;">$0.00</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                            <span>Shipping:</span>
                            <span style="font-weight: bold; color: var(--first-color);">FREE</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; font-size: 1.5rem; margin-bottom: 1.5rem;">
                            <span>Total:</span>
                            <span id="checkout-total" style="font-weight: bold; color: var(--first-color);">$0.00</span>
                        </div>
                        <button type="submit" form="checkout-form" class="button" style="width: 100%; padding: 1.2rem; border-radius: 0.5rem; font-size: 1.1rem; display: flex; justify-content: center; align-items: center; gap: 0.5rem;">
                            Proceed to Payment <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Universal Switcher Gear -->
    <div class="style-switcher" style="position: fixed; bottom: 20px; right: 20px; z-index: 999;">
        <div class="style-switcher-toggler" style="background: var(--first-color); color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">
            <i class="fas fa-cog fa-spin"></i>
        </div>
        <div class="colors" style="display: none;">
            <span class="color-1" onclick="setActiveStyle('color-1')"></span>
            <span class="color-2" onclick="setActiveStyle('color-2')"></span>
            <span class="color-3" onclick="setActiveStyle('color-3')"></span>
        </div>
    </div>

    <!-- Scroll Up -->
    <a href="#" class="scrollup" id="scroll-up">
        <i class="fas fa-arrow-up scrollup-icon"></i>
    </a>

    <script src="../scripts/root.js"></script>
    <script src="../scripts/pages/checkout.js"></script>
</body>
</html>
